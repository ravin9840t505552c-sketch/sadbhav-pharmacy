<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">
  <defs>

    <!-- Outer ring gradient -->
    <linearGradient id="outerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d2e"/>
      <stop offset="100%" style="stop-color:#0f5c44"/>
    </linearGradient>

    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e4c97e"/>
      <stop offset="100%" style="stop-color:#c8a84b"/>
    </linearGradient>

    <!-- Inner circle gradient -->
    <linearGradient id="innerCircleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f5c44"/>
      <stop offset="100%" style="stop-color:#1a7a5e"/>
    </linearGradient>

    <!-- Cross gradient -->
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0e0b0"/>
    </linearGradient>

    <!-- Leaf fill — medium dark green matching real photo -->
    <linearGradient id="leafFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#1e6b40"/>
      <stop offset="50%"  style="stop-color:#175c34"/>
      <stop offset="100%" style="stop-color:#0e3d20"/>
    </linearGradient>

    <!-- Midrib gradient — bright yellow-green like real photo -->
    <linearGradient id="midribGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#d4e84a"/>
      <stop offset="60%"  style="stop-color:#b0cc28"/>
      <stop offset="100%" style="stop-color:#88aa18"/>
    </linearGradient>

    <!-- Drop shadow for outer ring -->
    <filter id="ringShad" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8"
                    flood-color="rgba(10,61,46,0.45)"/>
    </filter>

    <!-- Glow for cross -->
    <filter id="crossGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ══════════════════════════════════════════════════
         CLIP PATH — inner circle boundary
         Leaves are clipped to stay inside this circle.
         Like object-fit: cover — nothing overflows.
    ══════════════════════════════════════════════════ -->
    <clipPath id="leafClip">
      <circle cx="200" cy="195" r="130"/>
    </clipPath>

    <!-- ══════════════════════════════════════════════════
         PEEPAL LEAF SYMBOL
         Precisely traced from real photo (32924.jpg).
         Origin (0,0) = top of leaf body where stem meets.
         Leaf body goes DOWN from origin.
         Measurements in SVG units:
           Width at widest ~160 units
           Body height ~200 units
           Tail extends to ~240 units
         Scale 0.44 applied when used → fits neatly in logo
    ══════════════════════════════════════════════════ -->
    <symbol id="leaf" viewBox="-80 0 160 250" overflow="visible">

      <!-- ── LEAF BODY ──
           Top: two gentle rounded lobes with shallow V notch at centre.
           LEFT lobe peaks at (-48, 16) — slightly bigger.
           RIGHT lobe peaks at (44, 18) — slightly smaller.
           Notch at (0, 8) — gentle dip, NOT a sharp V.
           Widest zone: y=60 to y=80.
           Narrows from y=120 downward.
           Tail: long slender drip-tip ending at (2, 245).
      -->
      <path d="
        M 0 8
        C -6 2, -20 0, -36 4
        C -52 8, -66 18, -72 34
        C -78 50, -76 70, -68 88
        C -60 104, -46 116, -32 128
        C -20 138, -10 148, -6 160
        C -4 170, -3 180, -2 192
        C -1 206, 0 220, 2 245
        C 0 220, 1 206, 2 192
        C 3 180, 4 170, 6 160
        C 10 148, 20 138, 32 128
        C 46 116, 60 104, 68 88
        C 76 70, 78 50, 72 34
        C 66 18, 52 8, 36 4
        C 20 0, 6 2, 0 8 Z"
        fill="url(#leafFill)"
        stroke="#0a3520"
        stroke-width="1.8"
        stroke-linejoin="round"/>

      <!-- Shallow notch highlight at top -->
      <path d="M -8 10 C -3 4, 3 4, 8 10"
            fill="none" stroke="#a8cc30"
            stroke-width="1.4" stroke-linecap="round" opacity="0.9"/>

      <!-- ── STEM — extends above leaf top ── -->
      <line x1="0" y1="8" x2="1" y2="-52"
            stroke="#c8d830" stroke-width="3"
            stroke-linecap="round" opacity="0.95"/>

      <!-- ── MIDRIB — full length from top into tail ── -->
      <line x1="0" y1="8" x2="2" y2="245"
            stroke="url(#midribGrad)" stroke-width="2.2"
            stroke-linecap="round" opacity="0.93"/>

      <!-- ── LATERAL VEINS — 7 pairs ──
           Arch upward from midrib then sweep out to edge.
           Exactly matching the long sweeping arcs in photo.
      -->
      <!-- Pair 1 — near top -->
      <path d="M -1 28 C -12 24, -28 22, -42 28"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.88"/>
      <path d="M  1 28 C  10 24,  24 22,  36 28"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.88"/>

      <!-- Pair 2 -->
      <path d="M -1 48 C -16 44, -36 42, -56 50"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.86"/>
      <path d="M  1 48 C  14 44,  32 42,  50 50"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.86"/>

      <!-- Pair 3 — widest veins -->
      <path d="M -1 70 C -18 66, -42 64, -64 72"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.85"/>
      <path d="M  1 70 C  16 66,  38 64,  58 72"
            fill="none" stroke="#a8cc30" stroke-width="1.4"
            stroke-linecap="round" opacity="0.85"/>

      <!-- Pair 4 -->
      <path d="M -1 92 C -16 90, -38 90, -58 98"
            fill="none" stroke="#a8cc30" stroke-width="1.3"
            stroke-linecap="round" opacity="0.80"/>
      <path d="M  1 92 C  14 90,  34 90,  52 98"
            fill="none" stroke="#a8cc30" stroke-width="1.3"
            stroke-linecap="round" opacity="0.80"/>

      <!-- Pair 5 -->
      <path d="M -1 114 C -14 114, -32 116, -48 124"
            fill="none" stroke="#a8cc30" stroke-width="1.2"
            stroke-linecap="round" opacity="0.74"/>
      <path d="M  1 114 C  12 114,  28 116,  42 124"
            fill="none" stroke="#a8cc30" stroke-width="1.2"
            stroke-linecap="round" opacity="0.74"/>

      <!-- Pair 6 -->
      <path d="M -1 136 C -10 138, -22 142, -32 150"
            fill="none" stroke="#90b820" stroke-width="1.1"
            stroke-linecap="round" opacity="0.66"/>
      <path d="M  1 136 C   8 138,  18 142,  26 150"
            fill="none" stroke="#90b820" stroke-width="1.1"
            stroke-linecap="round" opacity="0.66"/>

      <!-- Pair 7 — lower, near tail start -->
      <path d="M -1 158 C  -6 160, -14 164, -18 170"
            fill="none" stroke="#80a818" stroke-width="0.9"
            stroke-linecap="round" opacity="0.55"/>
      <path d="M  1 158 C   4 160,  10 164,  14 170"
            fill="none" stroke="#80a818" stroke-width="0.9"
            stroke-linecap="round" opacity="0.55"/>

    </symbol>

  </defs>

  <!-- =====================
       OUTER RINGS
       ===================== -->
  <circle cx="200" cy="195" r="178" fill="none"
          stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.4"/>
  <circle cx="200" cy="195" r="165"
          fill="url(#outerRingGrad)" filter="url(#ringShad)"/>
  <circle cx="200" cy="195" r="157" fill="none"
          stroke="url(#goldGrad)" stroke-width="1.8" opacity="0.9"/>
  <circle cx="200" cy="195" r="153" fill="none"
          stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- =====================
       GOLD DOTS — 8 positions
       ===================== -->
  <circle cx="200" cy="32"  r="4.5" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="200" cy="358" r="4.5" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="37"  cy="195" r="4.5" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="363" cy="195" r="4.5" fill="url(#goldGrad)" opacity="0.95"/>
  <circle cx="83"  cy="77"  r="3"   fill="url(#goldGrad)" opacity="0.75"/>
  <circle cx="317" cy="77"  r="3"   fill="url(#goldGrad)" opacity="0.75"/>
  <circle cx="83"  cy="313" r="3"   fill="url(#goldGrad)" opacity="0.75"/>
  <circle cx="317" cy="313" r="3"   fill="url(#goldGrad)" opacity="0.75"/>

  <!-- Tick marks beside top and bottom dots -->
  <line x1="154" y1="33"  x2="144" y2="33"  stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.45"/>
  <line x1="246" y1="33"  x2="256" y2="33"  stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.45"/>
  <line x1="154" y1="357" x2="144" y2="357" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.45"/>
  <line x1="246" y1="357" x2="256" y2="357" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.45"/>

  <!-- =====================
       INNER CIRCLE
       ===================== -->
  <circle cx="200" cy="195" r="132" fill="url(#innerCircleGrad)"/>
  <circle cx="200" cy="195" r="125" fill="none"
          stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- ══════════════════════════════════════════════════
       PEEPAL LEAVES
       Both leaves clipped strictly inside inner circle.
       LEFT:  translated left of cross, tilted -12°
       RIGHT: mirror of left (scaleX=-1), tilted +12°
       Scale 0.44 makes leaf fit neatly beside the cross.
       Left leaf slightly higher, right slightly lower
       for a natural staggered look.
  ══════════════════════════════════════════════════ -->
  <g clip-path="url(#leafClip)">

    <!-- LEFT leaf -->
    <g transform="translate(152,118) rotate(-12) scale(0.44)">
      <use href="#leaf"/>
    </g>

    <!-- RIGHT leaf — mirror flip on X axis -->
    <g transform="translate(248,124) rotate(12) scale(-0.44,0.44)">
      <use href="#leaf"/>
    </g>

  </g>

  <!-- =====================
       MEDICAL CROSS — in front of leaves
       ===================== -->
  <!-- Vertical bar -->
  <rect x="186" y="132" width="28" height="86"
        rx="8" ry="8"
        fill="url(#crossGrad)"
        filter="url(#crossGlow)"
        opacity="0.98"/>
  <!-- Horizontal bar -->
  <rect x="156" y="160" width="88" height="28"
        rx="8" ry="8"
        fill="url(#crossGrad)"
        filter="url(#crossGlow)"
        opacity="0.98"/>

  <!-- =====================================================================
       MEDICINE DROP "S" FALLING INTO HEART
       The complete unified symbol tells one story:
         "A drop of medicine falls in the shape of S
          and pours directly into a heart — healing it."

       STRUCTURE (all on the vertical bar of cross):
         1. TEARDROP    — top of upper bar (y=132 area) — the falling drop
         2. S-CURVE     — flows downward through cross centre
         3. HEART       — at the very bottom of the S tail
                          The S tip pours INTO the heart's top notch
                          Heart sits at cross intersection (y=174 area)

       All gold except heart which is warm red —
       making the heart visually "glow" as it receives the medicine.
  ====================================================================== -->
  <g transform="translate(200, 136)">

    <!-- ── 1. TEARDROP — the falling medicine drop at top ── -->
    <!-- Round body -->
    <ellipse cx="0" cy="6" rx="7" ry="8"
             fill="url(#goldGrad)" opacity="0.96"/>
    <!-- Pointed tip going upward — classic droplet shape -->
    <path d="M -3 2 C -1 -4, 1 -4, 3 2"
          fill="url(#goldGrad)" opacity="0.96"/>
    <!-- Liquid highlight inside drop -->
    <ellipse cx="-2.5" cy="5" rx="2" ry="3"
             fill="rgba(255,255,255,0.35)"
             transform="rotate(-20,-2.5,5)"/>

    <!-- ── 2. S-CURVE — medicine flowing downward ── -->
    <!-- The S starts from bottom of drop (y=14)
         curves RIGHT first (upper belly of S)
         then curves LEFT (lower belly of S)
         tail ends at (0,52) — pointing straight down
         into the top notch of the heart below          -->
    <path d="
      M 0 14
      C 9 18, 13 24, 9 31
      C 5 37, -9 39, -9 46
      C -9 50, -5 53, 0 54"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="3.4"
      stroke-linecap="round"
      opacity="0.94"/>

    <!-- Small motion lines beside drop — shows it is FALLING -->
    <line x1="-12" y1="4"  x2="-16" y2="4"
          stroke="url(#goldGrad)" stroke-width="1"
          stroke-linecap="round" opacity="0.45"/>
    <line x1="-12" y1="8"  x2="-17" y2="8"
          stroke="url(#goldGrad)" stroke-width="1"
          stroke-linecap="round" opacity="0.35"/>
    <line x1="-12" y1="12" x2="-15" y2="12"
          stroke="url(#goldGrad)" stroke-width="1"
          stroke-linecap="round" opacity="0.25"/>

    <!-- ── 3. HEART — receives the S drop at its top notch ── -->
    <!-- Heart sits so its top notch aligns exactly
         with the bottom of the S curve (y=54 above = y=190 absolute)
         The S tail pours RIGHT INTO the heart notch             -->

    <!-- Warm glow behind heart — medicine energy radiating -->
    <ellipse cx="0" cy="66" rx="14" ry="12"
             fill="rgba(232,85,85,0.18)"
             filter="url(#crossGlow)"/>

    <!-- Heart body — classic two-lobe shape -->
    <path d="
      M 0 54
      C -1 52, -5 49, -9 47
      C -14 44, -15 37, -11 34
      C -8 31, -4 32, -2 35
      C -1 37, 0 39, 0 39
      C 0 39, 1 37, 2 35
      C 4 32, 8 31, 11 34
      C 15 37, 14 44, 9 47
      C 5 49, 1 52, 0 54
      C -1 56, -2 60, -1 65
      C 0 68, 1 65, 0 54 Z"
      fill="#e85555"
      opacity="0.95"/>

    <!-- White highlight on left lobe of heart -->
    <path d="M -9 36 C -12 37, -12 41, -10 43"
          fill="none"
          stroke="rgba(255,255,255,0.5)"
          stroke-width="1.4"
          stroke-linecap="round"/>

    <!-- Gold rim around heart — connects it visually to the S -->
    <path d="
      M 0 54
      C -1 52, -5 49, -9 47
      C -14 44, -15 37, -11 34
      C -8 31, -4 32, -2 35
      C -1 37, 0 39, 0 39
      C 0 39, 1 37, 2 35
      C 4 32, 8 31, 11 34
      C 15 37, 14 44, 9 47
      C 5 49, 1 52, 0 54"
      fill="none"
      stroke="url(#goldGrad)"
      stroke-width="0.8"
      opacity="0.5"/>

    <!-- Small sparkle dots — medicine energy entering heart -->
    <circle cx="-5" cy="43" r="1.2" fill="url(#goldGrad)" opacity="0.7"/>
    <circle cx=" 5" cy="43" r="1.2" fill="url(#goldGrad)" opacity="0.7"/>
    <circle cx=" 0" cy="48" r="1.0" fill="url(#goldGrad)" opacity="0.6"/>

  </g>

  <!-- Gold star above cross — kept -->
  <polygon
    points="200,126 202.5,120 208,120 203.5,124.5 205.5,130 200,127 194.5,130 196.5,124.5 192,120 197.5,120"
    fill="url(#goldGrad)" opacity="0.92"/>

  <!-- =====================
       SEPARATOR LINES
       ===================== -->
  <path d="M 86 250 Q 200 240 314 250"
        fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.8"/>
  <path d="M 92 256 Q 200 246 308 256"
        fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.35"/>

  <!-- =====================
       NAME TEXT
       ===================== -->
  <!-- SADBHAV -->
  <text x="200" y="276"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28"
        font-weight="700"
        letter-spacing="4"
        text-anchor="middle"
        fill="url(#goldGrad)">
    SADBHAV
  </text>

  <!-- PHARMACY -->
  <text x="200" y="294"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12.5"
        font-weight="400"
        letter-spacing="7.5"
        text-anchor="middle"
        fill="rgba(255,255,255,0.78)">
    PHARMACY
  </text>

  <!-- =====================
       CURVED TEXT — TOP ARC
       Radius 132 — sits comfortably inside gold ring at 157
       Clear gap of ~25px from ring
       ===================== -->
  <path id="topArc" d="M 68,195 A 132,132 0 0,1 332,195" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif"
        font-size="11"
        letter-spacing="2.2"
        fill="url(#goldGrad)"
        opacity="0.95">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      PIPALCHOWK · BHARATPUR · CHITWAN
    </textPath>
  </text>

  <!-- =====================
       CURVED TEXT — BOTTOM ARC
       DDA number curves along bottom
       ===================== -->
  <path id="bottomArc" d="M 70,195 A 130,130 0 0,0 330,195" fill="none"/>
  <text font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5"
        letter-spacing="1.8"
        fill="rgba(255,255,255,0.6)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">
      DDA REG. NO. 37407060532127
    </textPath>
  </text>

  <!-- =====================
       ACCENT CORNER DOTS
       ===================== -->
  <circle cx="108" cy="314" r="2.5" fill="url(#goldGrad)" opacity="0.65"/>
  <circle cx="292" cy="314" r="2.5" fill="url(#goldGrad)" opacity="0.65"/>
  <circle cx="108" cy="76"  r="2.5" fill="url(#goldGrad)" opacity="0.65"/>
  <circle cx="292" cy="76"  r="2.5" fill="url(#goldGrad)" opacity="0.65"/>

  <!-- =====================
       BOTTOM PILL BANNER
       ===================== -->
  <rect x="122" y="378" width="156" height="20"
        rx="10" ry="10"
        fill="url(#outerRingGrad)"
        stroke="url(#goldGrad)"
        stroke-width="0.8"
        opacity="0.95"/>
  <text x="200" y="392"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="8"
        letter-spacing="1.2"
        text-anchor="middle"
        fill="url(#goldGrad)"
        opacity="0.9">
    EST. BHARATPUR · NEPAL
  </text>

</svg>